<?xml version="1.0" encoding="UTF-8"?>

    <?import javafx.scene.control.*?>
    <?import javafx.scene.layout.*?>

    <BorderPane xmlns="http://javafx.com/javafx"
    xmlns:fx="http://javafx.com/fxml"
    fx:controller="edu.sdccd.cisc191.controller.GameController">

    <top>
    <VBox spacing="8" style="-fx-padding: 12; -fx-background-color: #eef5ff;">
    <Label text="JavaFX gRPC 1v1 Match Client"
    style="-fx-font-size: 24px; -fx-font-weight: bold;" />

    <Label fx:id="statusLabel"
    text="Status: Not connected" />

    <HBox spacing="10">
    <Label text="Player:" />
    <TextField fx:id="playerNameField"
    promptText="Enter player name"
    prefWidth="180" />

    <CheckBox fx:id="rankedMatchCheckBox" text="Ranked" />

    <Label text="Difficulty:" />
    <ComboBox fx:id="difficultyComboBox"
    prefWidth="120" />
    </HBox>

    <!-- ✅ FIXED LOCATION -->
    <Label fx:id="matchSummaryLabel"
    text="Summary: No match" />
    </VBox>
    </top>

    <center>
    <TextArea fx:id="matchLog"
    editable="false"
    wrapText="true"
    promptText="Match events will appear here..." />
    </center>

    <bottom>
    <VBox spacing="10" style="-fx-padding: 12; -fx-background-color: #f8f8f8;">

    <HBox spacing="20">
    <Label fx:id="playerLabel" text="Player: Player" />
    <Label fx:id="opponentLabel" text="Opponent: Opponent" />
    <Label fx:id="winnerLabel" text="Winner: TBD" />
</HBox>

    <HBox spacing="10">
<Button text="Join Match" onAction="#handleJoinMatch" />
<Button text="Play Match" onAction="#handlePlayMatch" />
<Button text="Load Match History" onAction="#handleLoadHistory" />
<Button text="Reset Local View" onAction="#handleResetLocalView" />
</HBox>

    </VBox>
    </bottom>

    </BorderPane>